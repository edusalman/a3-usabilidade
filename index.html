<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProductHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="icon" href="img/icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-box-seam"></i> ProductHub
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <form class="d-flex ms-auto me-3" id="search-form">
                    <input
                        id="input-busca"
                        class="form-control me-2"
                        type="search"
                        placeholder="Buscar produto"
                    >
                    <button class="btn btn-warning" type="submit">Buscar</button>
                </form>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero text-center">
        <div class="container">
            <h1 class="display-5 fw-bold">Catálogo de Produtos</h1>
            <p class="lead">Explore nossos produtos em destaque.</p>
        </div>
    </section>

    <!-- PRODUTOS -->
    <section class="py-5">
        <div class="container">
            <h2 class="mb-4 fw-bold">Produtos</h2>
            <div id="products-container" class="row g-4">
                <div class="col-12 text-center text-muted">Carregando produtos...</div>
            </div>
        </div>
    </section>

    <!-- FAVORITOS -->
    <section class="py-5 bg-white">
        <div class="container">
            <h2 class="mb-4 fw-bold">⭐ Favoritos</h2>
            <div id="favorites-container" class="row g-4">
                <div class="col-12 text-center text-muted">Nenhum produto favoritado.</div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-3">
        <p class="mb-0">© 2026 ProductHub - Todos os direitos reservados</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
